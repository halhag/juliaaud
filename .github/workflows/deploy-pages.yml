name: Deploy to GitHub Pages

# Manual deploys only: nothing happens on push. When you want the live site
# updated, go to the Actions tab, pick this workflow, and click "Run workflow".
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never let two deploys race each other
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enables the site on first run)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Stage the game files (only what the game needs)
        run: |
          mkdir _site_out
          cp index.html _site_out/
          cp -r js _site_out/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site_out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
